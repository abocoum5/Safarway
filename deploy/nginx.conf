server {
    listen 80;
    server_name 72.61.102.253;

    access_log /var/log/nginx/goova_access.log;
    error_log  /var/log/nginx/goova_error.log warn;

    root  /var/www/goova/public;
    index index.html;

    # ── Service Worker — jamais mis en cache ─────────────────────
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires 0;
    }

    # ── manifest.json — revalidation systématique ────────────────
    location = /manifest.json {
        add_header Cache-Control "no-cache";
        expires 0;
    }

    # ── Fichiers statiques (icônes, images) ──────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # ── Page admin séparée ───────────────────────────────────────
    location = /admin {
        try_files /admin.html =404;
        add_header Cache-Control "no-cache";
    }

    # ── SPA — toutes les routes → index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── GitHub Webhook (auto-deploy) ─────────────────────────────
    location = /webhook {
        proxy_pass         http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        client_max_body_size 1M;
    }

    # ── API Backend (proxy → uvicorn:8000, strip /api) ───────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;

        # Taille max upload (photos profil / documents)
        client_max_body_size 10M;
    }

    # ── Compression gzip ─────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
    gzip_min_length 1000;
}

# ── HTTPS — À activer quand vous avez un domaine ─────────────────
# Lancez : certbot --nginx -d votre-domaine.com
# Certbot ajoutera automatiquement le bloc 443 ici.
